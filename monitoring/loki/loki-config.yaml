# CHAPTER3_REFERENCE.md §3.1 Observability, Table 1: Loki (Evidence Plane)
# Reference config for log aggregation; use with Grafana for centralized logs [23]-[27].
# Deploy Loki separately (e.g. helm install loki grafana/loki-stack) or use Grafana Cloud.
auth_enabled: false
server:
  http_listen_port: 3100
  grpc_listen_port: 9096
common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory
schema_config:
  configs:
    - from: "2020-10-24"
      store: boltdb-shipper
      object_store: filesystem
      schema: v11
      index:
        prefix: index_
        period: 24h
ruler:
  alertmanager_url: http://localhost:9093
analytics:
  reporting_enabled: false
