# CHAPTER3_REFERENCE.md §3.1 Observability, Table 1: OpenTelemetry (Evidence Plane)
# Collector config: traces, metrics, logs; correlate signals for debugging and forensics [24], [27].
# Use with OpenTelemetry Collector (deploy separately or with kube-prometheus-stack).
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: monitoring
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc: {}
          http: {}
      prometheus:
        config:
          scrape_configs:
            - job_name: 'otel-collector'
              scrape_interval: 10s
              static_configs:
                - targets: ['localhost:8888']
    processors:
      batch: {}
      memory_limiter:
        check_interval: 1s
        limit_mib: 512
    exporters:
      logging:
        verbosity: basic
      prometheus:
        endpoint: "0.0.0.0:8889"
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch, memory_limiter]
          exporters: [logging]
        metrics:
          receivers: [otlp, prometheus]
          processors: [batch, memory_limiter]
          exporters: [logging, prometheus]
        logs:
          receivers: [otlp]
          processors: [batch, memory_limiter]
          exporters: [logging]
