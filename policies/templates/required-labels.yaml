# CHAPTER3_REFERENCE.md §3.2.2 Layer 2: Traceability labels
# Policy category 2: workload owner, deployment environment, compliance scope [37].
# Table 1: OPA/Gatekeeper — Control Plane. Audit evidence per 3.1 Traceability.
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequiredlabels
  annotations:
    description: "3.2.2 Layer 2 — required traceability labels for workload manifests"
spec:
  crd:
    spec:
      names:
        kind: K8sRequiredLabels
      validation:
        openAPIV3Schema:
          type: object
          properties:
            labels:
              type: array
              items:
                type: string
              description: "Required label keys (e.g. owner, environment, compliance-scope)"
            excludedNamespaces:
              type: array
              items:
                type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8srequiredlabels

        violation[{"msg": msg}] {
          input.review.object.kind == "Deployment"
          not excluded_namespace
          required := input.parameters.labels[_]
          not input.review.object.metadata.labels[required]
          msg := sprintf("Deployment must have label %q for traceability", [required])
        }

        violation[{"msg": msg}] {
          input.review.object.kind == "Deployment"
          not excluded_namespace
          required := input.parameters.labels[_]
          not input.review.object.spec.template.metadata.labels[required]
          msg := sprintf("Deployment pod template must have label %q for traceability", [required])
        }

        violation[{"msg": msg}] {
          input.review.object.kind == "Pod"
          not excluded_namespace
          required := input.parameters.labels[_]
          not input.review.object.metadata.labels[required]
          msg := sprintf("Pod must have label %q for traceability", [required])
        }

        violation[{"msg": msg}] {
          input.review.object.kind == "ReplicaSet"
          not excluded_namespace
          required := input.parameters.labels[_]
          not input.review.object.spec.template.metadata.labels[required]
          msg := sprintf("ReplicaSet pod template must have label %q for traceability", [required])
        }

        excluded_namespace {
          ns := input.review.object.metadata.namespace
          input.parameters.excludedNamespaces[_] == ns
        }
