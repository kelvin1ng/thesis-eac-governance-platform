# yamllint disable-file
# CHAPTER3_REFERENCE.md §3.2.2: Traceability labels; §3.2.2 firewall networking (no privileged, capabilities)
# Note: Helm template directives are valid here and may trigger YAML lint false positives.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "firewall.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "firewall.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    owner: {{ .Values.traceability.owner }}
    environment: {{ .Values.traceability.environment }}
    compliance-scope: {{ .Values.traceability.complianceScope }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "firewall.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "firewall.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        owner: {{ .Values.traceability.owner }}
        environment: {{ .Values.traceability.environment }}
        compliance-scope: {{ .Values.traceability.complianceScope }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: firewall
          image: {{ include "firewall.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            capabilities:
              add:
                - NET_RAW
                - NET_ADMIN
              drop:
                - ALL
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
