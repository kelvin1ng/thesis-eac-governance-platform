# CI: shellcheck, Terraform fmt/validate, yamllint, optional markdownlint
name: CI (shell, YAML, Terraform)
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          find . -name '*.sh' -not -path './.git/*' | xargs shellcheck -x || true

      - name: Terraform fmt
        run: |
          cd infra
          terraform fmt -check -recursive -diff || true

      - name: Terraform init & validate
        run: |
          cd infra
          terraform init -backend=false
          terraform validate

      - name: Yamllint
        run: |
          pip install yamllint
          yamllint -d relaxed . 2>/dev/null || true

      - name: Markdownlint (optional)
        run: |
          npx markdownlint-cli '**/*.md' 2>/dev/null || true
        continue-on-error: true
