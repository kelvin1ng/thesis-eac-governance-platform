# CHAPTER3_REFERENCE.md §3.5 Path B, Figure 3, Table 3: Governance change validation
# When policies/ or pipelines/ change: Conftest validates policies; CODEOWNERS enforce review [50].
name: Path B — Policy Check
on:
  pull_request:
    branches: [main]
    paths:
      - "policies/**"
      - "pipelines/**"
      - ".github/workflows/**"
jobs:
  conftest-policies:
    name: conftest-policies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Conftest
        run: |
          wget -qO- https://github.com/open-policy-agent/conftest/releases/latest/download/conftest_linux_amd64.tar.gz | tar -xz
          chmod +x conftest && sudo mv conftest /usr/local/bin
      - name: Conftest (manifests against policies)
        run: |
          conftest test apps/firewall/kustomize/base/deployment.yaml apps/firewall/kustomize/base/service.yaml --policy policies/rego/
